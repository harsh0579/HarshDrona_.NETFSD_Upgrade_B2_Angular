</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container-fluid">
<a class="navbar-brand" href="index.html">Upgrad Events</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

<div class="container mt-5" style="max-width:500px">

<h3>Event Registration</h3>

<div id="eventDetails" class="border p-3 mb-3"></div>

<form onsubmit="registerEvent(event)">
<input class="form-control mb-2" placeholder="First Name" required>
<input class="form-control mb-2" placeholder="Last Name" required>
<input type="email" class="form-control mb-2" placeholder="Email" required>
<button class="btn btn-primary">Register</button>
</form>

</div>

<script>
let p=new URLSearchParams(window.location.search)
document.getElementById("eventDetails").innerHTML=`
<p><b>ID:</b> ${p.get("id")}</p>
<p><b>Name:</b> ${p.get("name")}</p>
<p><b>Category:</b> ${p.get("category")}</p>
<p><b>Date:</b> ${p.get("date")}</p>
<p><b>Time:</b> ${p.get("time")}</p>
`
</script>

<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
