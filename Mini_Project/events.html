<div class="container mt-4">

<h4>Add Event</h4>

<form id="eventForm">
<input id="eventId" class="form-control mb-2" placeholder="Event ID" required>
<input id="eventName" class="form-control mb-2" placeholder="Event Name" required>

<select id="eventCategory" class="form-control mb-2" required>
<option value="">Category</option>
<option>Tech</option>
<option>Industrial</option>
</select>

<input id="eventDate" type="date" class="form-control mb-2" required>
<input id="eventTime" type="time" class="form-control mb-2" required>
<input id="eventUrl" type="url" class="form-control mb-2" placeholder="Event URL" required>

<button class="btn btn-success">Add Event</button>
</form>

<input id="search" class="form-control mt-3" placeholder="Search..." onkeyup="searchEvent()">

<div id="adminEvents" class="row"></div>

<button onclick="logout()" class="btn btn-danger mt-3">Logout</button>

</div>

<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
