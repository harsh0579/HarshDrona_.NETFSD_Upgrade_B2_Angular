<!DOCTYPE html>
<html>
<head>

<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f6f7;
    font-family: Arial;
}

/* CONTACT IMAGE */

.contact-img{
    width:100%;
    height:300px;
    object-fit:cover;
}

/* FORM */

.form-box{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* FOOTER */

.footer{
    background:#212529;
    color:white;
    padding:40px;
    margin-top:40px;
}

.footer a{
    color:#ddd;
    text-decoration:none;
}

.footer a:hover{
    color:white;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container-fluid">

<a class="navbar-brand" href="index.html">Upgrad Events</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">

<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

<li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>

<li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>

<li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>

</ul>

</div>

</div>

</nav>

<!-- IMAGE -->

<img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3" class="contact-img">

<!-- FORM -->

<div class="container mt-5">

<div class="form-box">

<h3 class="text-center mb-3">Contact Us</h3>

<form onsubmit="contactSubmit(event)">

<div class="mb-3">
<label>Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Description</label>
<textarea class="form-control" required></textarea>
</div>

<button class="btn btn-success w-100">Submit</button>

</form>

</div>

</div>

<!-- FOOTER -->

<footer class="footer">

<div class="container">

<div class="row">

<div class="col-md-4">
<h5>Upgrad Events</h5>
<p>Virtual events for learning and networking.</p>
</div>

<div class="col-md-4">
<h5>Quick Links</h5>
<ul class="list-unstyled">
<li><a href="index.html">Home</a></li>
<li><a href="login.html">Login</a></li>
<li><a href="events.html">Events</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</div>

<div class="col-md-4">
<h5>Contact</h5>
<p>Email: support@upgrad.com</p>
<p>Phone: +91 8766518883</p>
</div>

</div>

<hr>

<p class="text-center">&copy; 2026 Upgrad Events</p>

</div>

</footer>

<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
