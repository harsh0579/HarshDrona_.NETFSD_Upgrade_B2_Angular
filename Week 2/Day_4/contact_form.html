<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Responsive Contact Form</title>

 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="container my-5">
    
    <div class="row justify-content-center">
      <div class="col-lg-8 col-md-10">

        <div class="card shadow p-4">
          <h3 class="text-center mb-4">Contact Us</h3>

          <form>

           
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Enter your full name" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter your email" required>
              </div>
            </div>

           
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-control" placeholder="Enter phone number" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Subject</label>
                <input type="text" class="form-control" placeholder="Enter subject" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Message</label>
              <textarea class="form-control" rows="4" placeholder="Write your message here..." required></textarea>
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-between">
              <button type="reset" class="btn btn-secondary">Reset</button>
              <button type="submit" class="btn btn-primary">Submit</button>
            </div>

          </form>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
