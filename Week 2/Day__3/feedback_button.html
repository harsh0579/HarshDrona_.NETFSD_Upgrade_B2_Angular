<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Feedback</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f4f6f8;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .message {
      margin-top: 20px;
      font-size: 16px;
      color: green;
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>We Value Your Feedback</h2>
    <button id="feedbackBtn">Submit Feedback</button>
    <p id="confirmationMessage" class="message">
      ✅ Thank you! Your feedback has been submitted successfully.
    </p>
  </div>

  <script>
    
    const button = document.getElementById("feedbackBtn");
    const message = document.getElementById("confirmationMessage");

    
    button.addEventListener("click", () => {
      message.style.display = "block";
    });
  </script>

</body>
</html>
